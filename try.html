<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SuperFast API — Try it Now</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            background: #0d0d0d;
            color: #eaeaea;
        }
        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111;
            border-bottom: 1px solid #222;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #4cc9f0;
        }
        nav a {
            margin-left: 20px;
            color: #eaeaea;
            text-decoration: none;
            font-size: 16px;
        }
        .container {
            max-width: 700px;
            margin: auto;
            padding: 60px 20px;
            text-align: center;
        }
        h1 {
            font-size: 42px;
            color: #4cc9f0;
            margin-bottom: 20px;
        }
        p {
            opacity: 0.8;
            font-size: 18px;
            margin-bottom: 40px;
        }
        input {
            width: 80%;
            padding: 14px;
            font-size: 18px;
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
            background: #111;
            color: #eaeaea;
            border: 1px solid #222;
        }
        button {
            padding: 14px 28px;
            background: #4cc9f0;
            color: #000;
            border-radius: 8px;
            font-weight: 600;
            font-size: 18px;
            border: none;
            cursor: pointer;
        }
        #result {
            margin-top: 40px;
            font-size: 22px;
            font-weight: 600;
        }
        footer {
            padding: 40px;
            text-align: center;
            opacity: 0.6;
            font-size: 14px;
        }
        footer a {
            color: #4cc9f0;
            text-decoration: none;
            margin: 0 10px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">SuperFast API</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="try.html">Try it Now</a>
        <a href="terms.html">Terms</a>
        <a href="privacy.html">Privacy</a>
    </nav>
</header>

<div class="container">
    <h1>Try it Now</h1>
    <p>Enter a number and test the SuperFast API in real time.</p>

    <input id="numberInput" type="number" placeholder="Enter a number...">
    <br>
    <input id="apiKeyInput" type="text" placeholder="Your API Key...">
    <br>
    <button onclick="checkPrime()">Check Prime</button>

    <div id="result"></div>
</div>

<footer>
    SuperFast API — Powered by C++ and FastAPI  
    <br><br>
    <a href="terms.html">Terms of Service</a> |
    <a href="privacy.html">Privacy Policy</a>
</footer>

<script>
async function checkPrime() {
    const number = document.getElementById("numberInput").value;
    const apiKey = document.getElementById("apiKeyInput").value;
    const resultDiv = document.getElementById("result");

    if (!number) {
        resultDiv.innerHTML = "Please enter a number.";
        return;
    }
    if (!apiKey) {
        resultDiv.innerHTML = "Please enter your API key.";
        return;
    }

    resultDiv.innerHTML = "Checking...";

    try {
        const response = await fetch("https://superfast-api.onrender.com/prime/pro", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "x-api-key": apiKey
            },
            body: JSON.stringify({ n: Number(number) })
        });

        const data = await response.json();

        if (data.error) {
            resultDiv.innerHTML = "Error: " + data.error;
            return;
        }

        if (data.is_prime) {
            resultDiv.innerHTML = number + " is PRIME ✔️";
        } else {
            resultDiv.innerHTML = number + " is NOT prime ❌";
        }

    } catch (err) {
        resultDiv.innerHTML = "Connection error.";
    }
}
</script>

</body>
</html>
